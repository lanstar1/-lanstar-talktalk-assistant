services:
  - type: web
    name: lanstar-talktalk-assistant
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: lanstar-storage
      mountPath: /opt/render/project/src/storage
      sizeGB: 5
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_MODEL
        value: gpt-4.1-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: TALKTALK_STORAGE_STATE_PATH
        value: /opt/render/project/src/storage/talktalk-account-1.state.json
